<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

.login-box{
    background:white;
    padding:30px;
    border-radius:10px;
    width:300px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    display:block;
    font-size:14px;
    margin-bottom:5px;
}

.input-group input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#4facfe;
    border:none;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#007bff;
}

.footer{
    text-align:center;
    margin-top:10px;
    font-size:13px;
}
</style>
</head>

<body>

<div class="login-box">
<h2>Login</h2>

<form>
<div class="input-group">
<label>Email</label>
<input type="email" placeholder="Enter email" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" placeholder="Enter password" required>
</div>

<button type="submit">Login</button>

<div class="footer">
<p>Don't have an account? <a href="#">Register</a></p>
</div>

</form>
</div>

</body>
</html>
